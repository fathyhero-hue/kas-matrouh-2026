name: Build & Upload Matrouh Cup Android App - Direct Download Pro

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create Manifest and Build
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

          cat <<EOF > twa-manifest.json
          {
            "packageId": "online.matrouhcup.twa",
            "host": "matrouhcup.online",
            "name": "منصة مطروح الرياضية",
            "shortName": "مطروح الرياضية",
            "themeColor": "#0A1428",
            "backgroundColor": "#0A1428",
            "startUrl": "/",
            "iconUrl": "https://matrouhcup.online/icon-512x512.png",
            "maskableIconUrl": "https://matrouhcup.online/icon-512x512.png",
            "appVersionCode": 2,
            "appVersionName": "1.1.0",
            "display": "standalone",
            "orientation": "default",
            "scion": true,
            "fingerprints": [],
            "features": {},
            "alphaDependencies": false,
            "signingKey": {
              "path": "./matrouh-cup.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap"
          }
          EOF

          echo "yes" | bubblewrap build --signingKey ./matrouh-cup.keystore --alias android --no-interactive

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          path: |
            **/*.aab
            **/*.apk
          if-no-files-found: warn

      - name: Show Direct Download Links
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            if(artifacts.data.total_count === 0){
              console.log("No artifacts found!");
            } else {
              artifacts.data.artifacts.forEach(a => {
                console.log(`Artifact: ${a.name}`);
                console.log(`Direct Download Link: ${a.archive_download_url}`);
              });
            }