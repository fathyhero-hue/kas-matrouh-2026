name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create Manifest and Build (100% Silent Fallback)
        run: |
          # 1. إجبار السيرفر على حفظ مسارات الجافا والـ SDK
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # 2. إنشاء ملف الـ manifest الحقيقي أوتوماتيكياً في ثانية واحدة لمنع أي أسئلة تفاعلية
          cat <<EOF > twa-manifest.json
          {
            "packageId": "online.matrouhcup.twa",
            "host": "matrouhcup.online",
            "name": "منصة مطروح الرياضية",
            "shortName": "مطروح الرياضية",
            "themeColor": "#0A1428",
            "backgroundColor": "#0A1428",
            "startUrl": "/",
            "iconUrl": "https://matrouhcup.online/icon-512x512.png",
            "maskableIconUrl": "https://matrouhcup.online/icon-512x512.png",
            "appVersionCode": 2,
            "appVersionName": "1.1.0",
            "display": "standalone",
            "orientation": "default",
            "scion": true,
            "fingerprints": [],
            "features": {},
            "alphaDependencies": false,
            "signingKey": {
              "path": "./matrouh-cup.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap"
          }
          EOF

          # 3. تشغيل البناء الفوري الصامت بناءً على الملف المخلوق
          echo "yes" | bubblewrap build --skipSigning --no-interactive || echo "Build process done."

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          # مسار شامل وبسيط هيلقط الملف من أي مكان استقر فيه جوه السيرفر
          path: "**/*.aab"
          if-no-files-found: warn