name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure and Fast Build (No Init)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # البناء وإخراج الملف في الفولدر الرئيسي للسيرفر مباشرة
          echo "yes" | bubblewrap build --skipSigning --no-interactive

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          # مسار ذكي وشامل هيلقط أي ملف ينتهي بـ aab جوه السيرفر بالمللي
          path: "./*.aab"
          if-no-files-found: error