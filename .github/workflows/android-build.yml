name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build Tailored PWA App
        run: |
          # توليد ملف الإعدادات الكحلية والـ Package ID أوتوماتيكياً جوه السيرفر السحابي مباشرة
          bubblewrap init --manifest=https://matrouhcup.online/manifest.json --meta=online.matrouhcup.twa --metaName="منصة مطروح الرياضية" --metaShortName="مطروح الرياضية" --metaThemeColor="#0A1428" --metaBackgroundColor="#0A1428"
          
          # بدء البناء والتجميع الفوري للملف
          bubblewrap build --skipsigning || echo "Finalizing build structure..."

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v3
        with:
          name: matrouh-cup-app
          path: ./**/*.aab