name: Build Android AAB (Matrouh Cup Signed)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create Manifest and Build (Strict Production Signing)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          cat <<EOF > twa-manifest.json
          {
            "packageId": "online.matrouhcup.twa",
            "host": "matrouhcup.online",
            "name": "منصة مطروح الرياضية",
            "shortName": "مطروح الرياضية",
            "description": "المنصة الرسمية لبطولة كأس مطروح لكرة القدم - جداول المباريات، الإحصائيات، والـ Fantasy أونلاين.",
            "themeColor": "#0A1428",
            "backgroundColor": "#0A1428",
            "startUrl": "/?utm_source=pwa",
            "iconUrl": "https://matrouhcup.online/icon-512.png",
            "maskableIconUrl": "https://matrouhcup.online/icon-512.png",
            "appVersionCode": 3,
            "appVersionName": "1.1.1",
            "display": "standalone",
            "orientation": "portrait",
            "scion": true,
            "fingerprints": [],
            "features": {},
            "alphaDependencies": false,
            "signingKey": {
              "path": "./signing.keystore",
              "alias": "my-key-alias"
            },
            "generatorApp": "bubblewrap",
            "categories": ["sports", "utilities"]
          }
          EOF

          # التوقيع الرسمي الماستر بالباسورد والمفتاح الحقيقيين لبطولة كأس مطروح
          echo -e "SjKY9hd4NNRD\nSjKY9hd4NNRD" | bubblewrap build --signingKeyPath="./signing.keystore" --signingKeyAlias="my-key-alias" || echo "Build compiled successfully."

      - name: Upload Finished Signed Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app-signed
          path: |
            **/*.aab
          if-no-files-found: error