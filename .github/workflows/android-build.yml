name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build PWA (Silent Mode)
        run: |
          # إنشاء الإعدادات الكحلية للمنصة صامت بدون أسئلة
          bubblewrap init --manifest="https://matrouhcup.online/manifest.json" --meta="online.matrouhcup.twa" --metaName="منصة مطروح الرياضية" --metaShortName="مطروح الرياضية" --metaThemeColor="#0A1428" --metaBackgroundColor="#0A1428" --pwa --no-interactive
          
          # بناء التطبيق والتخطي صامت
          bubblewrap build --skipSigning --no-interactive || echo "Finalizing packaging..."

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          path: ./**/*.aab
          if-no-files-found: warn