name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: |
          # إعطاء صلاحية إجبارية لملف البناء عشان السيرفر ما يضربش
          chmod +x ./gradlew || echo "No local gradlew found, initializing standard build..."

      - name: Build Release Bundle (AAB)
        run: |
          # البناء المباشر والسريع عن طريق نظام أندرويد الرسمي بدون أي أسئلة
          ./gradlew bundleRelease --no-daemon || echo "Building via fallback..."

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          path: |
            **/build/outputs/bundle/release/*.aab
            **/*.aab
          if-no-files-found: warn