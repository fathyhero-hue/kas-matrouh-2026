name: Build Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          # الموافقة الإجبارية الصامتة على كل رخص وشروط أندرويد جوه السيرفر
          yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build PWA (Complete Silent Automation)
        run: |
          # 1. خلق ملف إعدادات المسارات المسبقة للـ CLI لمنع أي أسئلة عن مسار الجافا أو الـ SDK
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # 2. تشغيل الـ init وتمرير الموافقات وضغطات الـ Enter أوتوماتيكياً دفعة واحدة
          echo -e "\n\n\n\n\n\n" | bubblewrap init --manifest="https://matrouhcup.online/manifest.json" --meta="online.matrouhcup.twa" --metaName="منصة مطروح الرياضية" --metaShortName="مطروح الرياضية" --metaThemeColor="#0A1428" --metaBackgroundColor="#0A1428" --pwa
          
          # 3. تعديل الـ Version Code ليكون 2 والـ Version Name ليكون 1.1.0 جوه ملف الـ manifest اللي اتخلق
          sed -i 's/"versionCode": 1/"versionCode": 2/g' twa-manifest.json || echo "Setting code..."
          sed -i 's/"versionName": "1.0.0"/"versionName": "1.1.0"/g' twa-manifest.json || echo "Setting name..."

          # 4. بناء وتجميع الـ AAB صامت وتخطي التوقيع المحلي (جوجل بلاي سيتولى التوقيع)
          echo "yes" | bubblewrap build --skipSigning

      - name: Upload Finished AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          path: ./**/*.aab
          if-no-files-found: error