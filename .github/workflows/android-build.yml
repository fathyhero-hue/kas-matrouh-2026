name: Build & Upload Android AAB (Matrouh Cup)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Accept SDK licenses
      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      # 6. Install Bubblewrap CLI
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # 7. Create manifest and build (full build)
      - name: Create Manifest and Build
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          cat <<EOF > twa-manifest.json
          {
            "packageId": "online.matrouhcup.twa",
            "host": "matrouhcup.online",
            "name": "منصة مطروح الرياضية",
            "shortName": "مطروح الرياضية",
            "themeColor": "#0A1428",
            "backgroundColor": "#0A1428",
            "startUrl": "/",
            "iconUrl": "https://matrouhcup.online/icon-512x512.png",
            "maskableIconUrl": "https://matrouhcup.online/icon-512x512.png",
            "appVersionCode": 2,
            "appVersionName": "1.1.0",
            "display": "standalone",
            "orientation": "default",
            "scion": true,
            "fingerprints": [],
            "features": {},
            "alphaDependencies": false,
            "signingKey": {
              "path": "./matrouh-cup.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap"
          }
          EOF

          # Build كامل مع التوقيع
          echo "yes" | bubblewrap build --signingKey ./matrouh-cup.keystore --alias android --no-interactive

      # 8. Upload artifact
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrouh-cup-app
          # يرفع أي ملف .aab أو .apk موجود في المشروع بعد البناء
          path: |
            **/*.aab
            **/*.apk
          if-no-files-found: warn